<section class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
  <div
    class="px-6 py-4 border-b border-gray-800 flex justify-between items-center"
  >
    <h3 class="text-lg font-semibold">Recent Jobs</h3>
    <input
      type="text"
      placeholder="Search jobs..."
      class="bg-gray-800 text-sm px-3 py-2 rounded-lg border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
  </div>

  <div class="overflow-x-auto">
    <table class="min-w-full text-sm text-left">
      <thead class="bg-gray-800 text-gray-400 uppercase text-xs">
        <tr>
          <th class="px-6 py-3">ID</th>
          <th class="px-6 py-3">Job</th>
          <th class="px-6 py-3">Queue</th>
          <th class="px-6 py-3">Attempts</th>
          <th class="px-6 py-3">Status</th>
          <th class="px-6 py-3">Created</th>
          <th class="px-6 py-3">Actions</th>
        </tr>
      </thead>

      <tbody class="divide-y divide-gray-800">
        <!-- Row 1 -->
        <tr class="hover:bg-gray-800/40 transition">
          <td class="px-6 py-4">#1024</td>
          <td class="px-6 py-4 font-medium">SendWelcomeEmail</td>
          <td class="px-6 py-4">default</td>
          <td class="px-6 py-4">1</td>
          <td class="px-6 py-4">
            <span
              class="px-3 py-1 text-xs font-semibold rounded-full bg-green-500/10 text-green-400"
            >
              Completed
            </span>
          </td>
          <td class="px-6 py-4 text-gray-400">2 mins ago</td>
          <td class="px-6 py-4 space-x-2">
            <button class="text-blue-400 hover:underline text-xs">View</button>
          </td>
        </tr>

        <!-- Row 2 -->
        <tr class="hover:bg-gray-800/40 transition">
          <td class="px-6 py-4">#1025</td>
          <td class="px-6 py-4 font-medium">GenerateReport</td>
          <td class="px-6 py-4">reports</td>
          <td class="px-6 py-4">3</td>
          <td class="px-6 py-4">
            <span
              class="px-3 py-1 text-xs font-semibold rounded-full bg-red-500/10 text-red-400"
            >
              Failed
            </span>
          </td>
          <td class="px-6 py-4 text-gray-400">5 mins ago</td>
          <td class="px-6 py-4 space-x-2">
            <button class="text-yellow-400 hover:underline text-xs">
              Retry
            </button>
            <button class="text-red-400 hover:underline text-xs">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
